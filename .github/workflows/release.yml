name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Linux AOT dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Publish
        shell: bash
        run: |
          dotnet publish src/AutoLUT.App/AutoLUT.App.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishAot=true \
            -o build/${{ matrix.rid }}

      - name: Remove debug symbols
        shell: bash
        run: rm -f build/${{ matrix.rid }}/*.pdb build/${{ matrix.rid }}/*.dbg

      - name: Bundle savestates
        shell: bash
        run: |
          mkdir -p build/${{ matrix.rid }}/savestates
          cp -r savestates/lut_gzs_1.0 savestates/lut_gzs_1.2 build/${{ matrix.rid }}/savestates/

      - name: Zip build
        shell: bash
        run: |
          cd build/${{ matrix.rid }}
          7z a -tzip "../AutoLUT-${{ github.ref_name }}-${{ matrix.rid }}.zip" "*"

      - uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.rid }}
          path: build/AutoLUT-${{ github.ref_name }}-${{ matrix.rid }}.zip
          if-no-files-found: error

  savestates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Zip savestates
        run: |
          cd savestates
          zip -r "../savestates-${{ github.ref_name }}.zip" lut_gzs_1.0 lut_gzs_1.2

      - uses: actions/upload-artifact@v7
        with:
          name: savestates
          path: savestates-${{ github.ref_name }}.zip
          if-no-files-found: error

  release:
    needs: [build, savestates]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*.zip
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: ''
