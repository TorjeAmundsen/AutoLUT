name: Deploy to GitHub Pages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Publish browser app
        run: dotnet publish src/AutoLUT.Browser -c Release

      - name: Build Wii homebrew
        run: docker run --rm -v "$PWD:/src" -w /src/wii devkitpro/devkitppc:latest make

      - name: Build N64 ROM
        run: docker run --rm -v "$PWD:/src" -w /src ghcr.io/dragonminded/libdragon:latest sh n64/build.sh

      - name: Assemble site
        run: |
          SITE=src/AutoLUT.Browser/bin/Release/net10.0-browser/publish/wwwroot
          # Jekyll would drop the _framework directory without this.
          touch "$SITE/.nojekyll"
          cd savestates
          zip -r "../$SITE/savestates-1.0.zip" lut_gzs_1.0
          zip -r "../$SITE/savestates-1.2.zip" lut_gzs_1.2
          cd ..
          mkdir -p hbc/apps/autolut-palette
          cp wii/boot.dol wii/meta.xml hbc/apps/autolut-palette/
          cd hbc
          zip -r "../$SITE/AutoLUT-Palette.zip" apps
          cd ..
          cp n64/autolut-palette.z64 "$SITE/"

      - uses: actions/upload-pages-artifact@v5
        with:
          path: src/AutoLUT.Browser/bin/Release/net10.0-browser/publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
