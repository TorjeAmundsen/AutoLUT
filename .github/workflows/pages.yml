name: Deploy to GitHub Pages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Publish browser app
        run: dotnet publish src/AutoLUT.Browser -c Release

      - name: Assemble site
        run: |
          SITE=src/AutoLUT.Browser/bin/Release/net10.0-browser/publish/wwwroot
          # Jekyll would drop the _framework directory without this.
          touch "$SITE/.nojekyll"
          cd savestates
          zip -r "../$SITE/savestates.zip" lut_gzs_1.0 lut_gzs_1.2

      - uses: actions/upload-pages-artifact@v5
        with:
          path: src/AutoLUT.Browser/bin/Release/net10.0-browser/publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
